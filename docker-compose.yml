version: '3.9'

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: todo_frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - todo_app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: todo_backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    networks:
      - todo_app_network

networks:
  todo_app_network:
    driver: bridge